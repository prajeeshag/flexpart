stages:
  - build
  - test_options
  - test_omp
  - compare

default:
  tags:
    - podman

alma8-build:
  image: harbor.wolke.img.univie.ac.at/flexpart/almalinux8:fp11_1
  stage: build

  script:
    - export FC=gfortran
    - export LIBRARY_PATH=/usr/lib64:/usr/local/lib64
    - export CPATH=/usr/include:/usr/local/include:/usr/lib64/gfortran/modules
    - make -j -C src -f makefile_gfortran
  artifacts:
    paths:
      - ./src/FLEXPART

options-test:
  image: harbor.wolke.img.univie.ac.at/flexpart/almalinux8:fp11_1
  stage: test_options
  needs:
    - alma8-build

  script:
    - ulimit -s unlimited
    - bash ./tests/run_default_options_test.sh

openmp-test:
  image: harbor.wolke.img.univie.ac.at/flexpart/almalinux8:fp11_1
  stage: test_omp
  when: manual
  needs:
    - alma8-build

  script:
    - ulimit -s unlimited
    - bash ./tests/run_openmp_test.sh
  
  #artifacts:
  #  when: on_success
  #  paths:
  #    - ./tests/output

comparison:
  image: harbor.wolke.img.univie.ac.at/flexpart/almalinux8:latest
  stage: compare
  when: manual
  needs:
    - options-test
  script:
    - uptime
