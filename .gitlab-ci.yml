stages:
  - build

default:
  tags:
    - podman

alma8-build:
  image: harbor.wolke.img.univie.ac.at/flexpart/almalinux8:fp11_jasp
  stage: build
  when: manual

  script:
    - export FC=gfortran
    - export LIBRARY_PATH=/usr/lib64:/usr/local/lib64
    - export CPATH=/usr/include:/usr/local/include:/usr/lib64/gfortran/modules
    - make -j -C src -f makefile_gfortran
    - ulimit -s unlimited
    - ./src/FLEXPART
  artifacts:
    paths:
      - ./src/FLEXPART
