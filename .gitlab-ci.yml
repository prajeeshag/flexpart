stages:
  - build
  - test

default:
  tags:
    - podman

ubuntu-build:
  image: ubuntu:18.04
  stage: build
  when: manual

  before_script:
    - apt-get update -qq && apt-get install -y -qq gfortran libnetcdf-dev libnetcdff-dev libeccodes-dev netcdf-bin

  script:
    - export FC=gfortran
    - export LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu
    - export CPATH=/usr/include
    - make -C src -f makefile_ci ncf=yes
    - ulimit -s unlimited
    - ./src/FLEXPART

  artifacts:
    paths:
      - ./src/FLEXPART
